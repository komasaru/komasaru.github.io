# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
  - /docs # ignore Minimal Mistakes /docs
  - /test # ignore Minimal Mistakes /test
keep_files:
  - .git
  - .svn
encoding    : "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown         : kramdown
highlighter      : rouge
lsi              : false
excerpt_separator: "<!--more-->"  #"\n\n"
incremental      : false  # (Incremental regeneration is still an experimental feature)


# Markdown Processing
kramdown:
  input         : GFM
  hard_wrap     : false
  auto_ids      : true
  footnote_nr   : 1
  entity_output : as_char
  toc_levels    : 1..6
  smart_quotes  : lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style   : compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style


# Outputting
permalink    : /:year/:month/:day/:title/  # /:categories/:title/
paginate     : 10 # amount of posts to show
paginate_path: /page:num/
timezone     : Asia/Tokyo  # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-archives

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-archives

# Jekyll Feed
feed:
  path: "atom.xml"
atom_feed:
  path: "https://www.mk-mode.com/blog/atom.xml"  # blank (default) uses feed.xml

# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: jekyll-archives  # liquid
  path: /categories/
tag_archive:
  type: jekyll-archives  # liquid
  path: /tags/
# https://github.com/jekyll/jekyll-archives
jekyll-archives:
  enabled:  all
    #- year
    #- month
    #- day
    #- categories
    #- tags
  layouts:
    year    : archive-taxonomy
    month   : archive-taxonomy
    day     : archive-taxonomy
    category: archive-taxonomy
    tag     : archive-taxonomy
  permalinks:
    year    : /:year/
    month   : /:year/:month/
    day     : /:year/:month/:day/
    category: /categories/:name/
    tag     : /tags/:name/


# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings : all
  comments  : []
  endings   : []
  #ignore:
  #  envs    : development
  blanklines: true
  profile   : false
  startings : []


# Defaults
defaults:
  # _posts
  - scope:
      path          : ""
      type          : posts
    values:
      layout        : single
      classes       : wide
      author_profile: true
      read_time     : false
      comments      : true
      share         : true
      related       : true

head_scripts:
  - "https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML"

# PubSubHubbub
hub_urls:
  - https://pubsubhubbub.appspot.com
  - https://push.superfeedr.com
# - https://mk-mode.superfeedr.com

