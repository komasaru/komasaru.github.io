name                 : "mk-mode.com"
#description          : "このブログは自作の自宅サーバに構築した Debian GNU/Linux で運用しています。PC・サーバ構築等の話題を中心に公開しております。"
description          : "このブログは自宅サーバ(Debian GNU/Linux)で運用してしている<a href=\"https://www.mk-mode.com/blog/\">ブログ</a>のクローンです。<br />PC・サーバ構築等の話題を中心に公開しております。"
url                  : "https://komasaru.github.io"  # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
baseurl              : "/"  # the subpath of your site, e.g. "/blog"
repository           : "komasaru/komasaru.github.io"  # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes"
teaser               : # path of fallback teaser image, e.g. "/assets/images/500x300.png"
breadcrumbs          : false  # true, false (default)
words_per_minute     : 200
comments:
  provider           : "disqus"  # false (default), "disqus", "discourse", "facebook", "google-plus", "staticman", "staticman_v2", "utterances", "custom"
  disqus:
    shortname        : "mkmodeblog"  # https://help.disqus.com/customer/portal/articles/466208-what-s-a-shortname-
  discourse:
    server           : # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    # https://developers.facebook.com/docs/plugins/comments
    appid            :
    num_posts        : # 5 (default)
    colorscheme      : # "light" (default), "dark"
  utterances:
    theme            : # "github-light" (default), "github-dark"
    issue_term       : # "pathname" (default)
staticman:
  allowedFields      : # ['name', 'email', 'url', 'message']
  branch             : # "master"
  commitMessage      : # "New comment by {fields.name}"
  filename           : # comment-{@timestamp}
  format             : # "yml"
  moderation         : # true
  path               : # "/_data/comments/{options.slug}" (default)
  requiredFields     : # ['name', 'email', 'message']
  transforms:
    email            : # "md5"
  generatedFields:
    date:
      type           : # "date"
      options:
        format       : # "iso8601" (default), "timestamp-seconds", "timestamp-milliseconds"
  endpoint           : # URL of your own deployment with trailing slash, will fallback to the public instance
reCaptcha:
  siteKey            :
  secret             :
search               : true  # true, false (default)
search_provider      : "google"  # lunr (default), algolia, google
search_full_content  : # true, false (default)
algolia:
  application_id     : # YOUR_APPLICATION_ID
  index_name         : # YOUR_INDEX_NAME
  search_only_api_key: # YOUR_SEARCH_ONLY_API_KEY
  powered_by         : # true (default), false
google:
  search_engine_id   : "partner-pub-7320193476057758:6328726109"  # YOUR_SEARCH_ENGINE_ID
  instant_search     : false  # false (default), true
  ads_for_mobile     : "ca-pub-7320193476057758"  # Mobile 用に追加
